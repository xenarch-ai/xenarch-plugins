<svg xmlns="http://www.w3.org/2000/svg" width="1544" height="500" viewBox="0 0 1544 500">
  <!-- Xenarch WordPress banner — 1544x500 -->
  <rect width="1544" height="500" fill="#0a0a0a"/>

  <!-- Background decorative nodes — proper node-edge patterns, no triangles -->
  <!-- Far left: small routing fragment -->
  <line x1="60" y1="180" x2="140" y2="220" stroke="#1a1a1a" stroke-width="1.5"/>
  <line x1="140" y1="220" x2="100" y2="310" stroke="#1a1a1a" stroke-width="1.5"/>
  <line x1="140" y1="220" x2="220" y2="260" stroke="#1a1a1a" stroke-width="1.5"/>
  <circle cx="60" cy="180" r="6" fill="#222"/>
  <circle cx="140" cy="220" r="8" fill="#252525"/>
  <circle cx="100" cy="310" r="5" fill="#222"/>
  <circle cx="220" cy="260" r="4.5" fill="#1e1e1e"/>

  <!-- Far left: lone pair -->
  <line x1="160" y1="100" x2="200" y2="140" stroke="#1a1a1a" stroke-width="1"/>
  <circle cx="160" cy="100" r="4" fill="#1e1e1e"/>
  <circle cx="200" cy="140" r="3" fill="#1a1a1a"/>

  <!-- Far right: small routing fragment -->
  <line x1="1380" y1="200" x2="1440" y2="260" stroke="#1a1a1a" stroke-width="1.5"/>
  <line x1="1440" y1="260" x2="1400" y2="340" stroke="#1a1a1a" stroke-width="1.5"/>
  <line x1="1440" y1="260" x2="1500" y2="230" stroke="#1a1a1a" stroke-width="1.5"/>
  <circle cx="1380" cy="200" r="5.5" fill="#222"/>
  <circle cx="1440" cy="260" r="7.5" fill="#252525"/>
  <circle cx="1400" cy="340" r="5" fill="#222"/>
  <circle cx="1500" cy="230" r="4" fill="#1e1e1e"/>

  <!-- Far right: lone pair -->
  <line x1="1320" y1="130" x2="1360" y2="160" stroke="#1a1a1a" stroke-width="1"/>
  <circle cx="1320" cy="130" r="3.5" fill="#1e1e1e"/>
  <circle cx="1360" cy="160" r="3" fill="#1a1a1a"/>

  <!-- Top scatter: floating nodes -->
  <circle cx="480" cy="60" r="3" fill="#1a1a1a"/>
  <circle cx="1060" cy="50" r="3.5" fill="#1a1a1a"/>

  <!-- Bottom scatter: floating nodes -->
  <line x1="340" y1="410" x2="400" y2="430" stroke="#1a1a1a" stroke-width="1"/>
  <circle cx="340" cy="410" r="4" fill="#1e1e1e"/>
  <circle cx="400" cy="430" r="3" fill="#1a1a1a"/>

  <line x1="1140" y1="400" x2="1200" y2="420" stroke="#1a1a1a" stroke-width="1"/>
  <circle cx="1140" cy="400" r="3.5" fill="#1e1e1e"/>
  <circle cx="1200" cy="420" r="3" fill="#1a1a1a"/>

  <!-- Central X constellation (hero) -->
  <line x1="620" y1="140" x2="772" y2="250" stroke="#333333" stroke-width="2"/>
  <line x1="924" y1="140" x2="772" y2="250" stroke="#333333" stroke-width="2"/>
  <line x1="620" y1="360" x2="772" y2="250" stroke="#333333" stroke-width="2"/>
  <line x1="924" y1="360" x2="772" y2="250" stroke="#333333" stroke-width="2"/>
  <circle cx="620" cy="140" r="8" fill="#f0f0f0"/>
  <circle cx="924" cy="140" r="8" fill="#f0f0f0"/>
  <circle cx="620" cy="360" r="8" fill="#f0f0f0"/>
  <circle cx="924" cy="360" r="8" fill="#f0f0f0"/>
  <circle cx="772" cy="250" r="11" fill="#f0f0f0"/>

  <!-- Wordmark — Space Grotesk per design system -->
  <text x="772" y="438" font-family="'Space Grotesk', system-ui, sans-serif" font-size="32" font-weight="300" fill="#f0f0f0" letter-spacing="-0.02em" text-anchor="middle">/xenarch</text>

  <!-- Tagline — Inter per design system -->
  <text x="772" y="472" font-family="'Inter', system-ui, sans-serif" font-size="15" font-weight="400" fill="#888888" text-anchor="middle">Charge AI agents for content access</text>
</svg>
