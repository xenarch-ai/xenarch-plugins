<svg xmlns="http://www.w3.org/2000/svg" width="1544" height="500" viewBox="0 0 1544 500">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500&amp;family=JetBrains+Mono:wght@400;500&amp;family=Space+Grotesk:wght@300;400;500&amp;display=swap');
    </style>
  </defs>

  <!-- Background -->
  <rect width="1544" height="500" fill="#E8E4DF"/>

  <!-- Background texture -->
  <circle cx="70" cy="65" r="1.5" fill="#d5d0ca"/>
  <circle cx="200" cy="430" r="1.5" fill="#d8d3cd"/>
  <circle cx="1350" cy="55" r="1.5" fill="#d5d0ca"/>
  <circle cx="1480" cy="440" r="1.5" fill="#d8d3cd"/>
  <circle cx="400" cy="450" r="1" fill="#d8d3cd"/>
  <circle cx="1150" cy="50" r="1" fill="#d8d3cd"/>

  <!-- Wordmark -->
  <text x="72" y="72" font-family="'Space Grotesk', system-ui, sans-serif" font-size="22" font-weight="300" fill="#999999" letter-spacing="-0.02em">/xenarch</text>

  <!-- X constellation logo -->
  <line x1="1452" y1="42" x2="1472" y2="62" stroke="#c8c4bf" stroke-width="1.5"/>
  <line x1="1492" y1="42" x2="1472" y2="62" stroke="#c8c4bf" stroke-width="1.5"/>
  <line x1="1452" y1="82" x2="1472" y2="62" stroke="#c8c4bf" stroke-width="1.5"/>
  <line x1="1492" y1="82" x2="1472" y2="62" stroke="#c8c4bf" stroke-width="1.5"/>
  <circle cx="1452" cy="42" r="4" fill="#1a1a1a"/>
  <circle cx="1492" cy="42" r="4" fill="#1a1a1a"/>
  <circle cx="1452" cy="82" r="4" fill="#1a1a1a"/>
  <circle cx="1492" cy="82" r="4" fill="#1a1a1a"/>
  <circle cx="1472" cy="62" r="6" fill="#1a1a1a"/>

  <!-- Flow edges -->
  <line x1="352" y1="195" x2="512" y2="195" stroke="#c8c4bf" stroke-width="1.5"/>
  <line x1="572" y1="195" x2="742" y2="195" stroke="#c8c4bf" stroke-width="1.5"/>
  <line x1="802" y1="195" x2="980" y2="195" stroke="#c8c4bf" stroke-width="1.5"/>
  <line x1="1044" y1="195" x2="1192" y2="195" stroke="#c8c4bf" stroke-width="1.5"/>

  <!-- Node 1: AI Bot -->
  <circle cx="322" cy="195" r="30" fill="#c8c4bf"/>
  <rect x="309" y="187" width="26" height="15" rx="3" fill="#555555"/>
  <circle cx="316" cy="195" r="2" fill="#c8c4bf"/>
  <circle cx="328" cy="195" r="2" fill="#c8c4bf"/>
  <line x1="322" y1="187" x2="322" y2="180" stroke="#555555" stroke-width="1.5"/>
  <circle cx="322" cy="178" r="2" fill="#555555"/>
  <text x="322" y="246" font-family="'JetBrains Mono', monospace" font-size="11" fill="#555555" text-anchor="middle" letter-spacing="0.1em">AI BOT</text>
  <text x="322" y="262" font-family="'Inter', sans-serif" font-size="11" fill="#999999" text-anchor="middle">requests page</text>

  <!-- Node 2: Detection -->
  <circle cx="542" cy="195" r="30" fill="#c8c4bf"/>
  <ellipse cx="542" cy="195" rx="12" ry="8" fill="none" stroke="#555555" stroke-width="1.5"/>
  <circle cx="542" cy="195" r="4" fill="#555555"/>
  <text x="542" y="246" font-family="'JetBrains Mono', monospace" font-size="11" fill="#555555" text-anchor="middle" letter-spacing="0.1em">DETECTED</text>
  <text x="542" y="262" font-family="'Inter', sans-serif" font-size="11" fill="#999999" text-anchor="middle">bot identified</text>

  <!-- Node 3: 402 -->
  <circle cx="772" cy="195" r="30" fill="#c8c4bf"/>
  <text x="772" y="201" font-family="'JetBrains Mono', monospace" font-size="18" font-weight="500" fill="#1a1a1a" text-anchor="middle">402</text>
  <text x="772" y="246" font-family="'JetBrains Mono', monospace" font-size="11" fill="#555555" text-anchor="middle" letter-spacing="0.1em">GATED</text>
  <text x="772" y="262" font-family="'Inter', sans-serif" font-size="11" fill="#999999" text-anchor="middle">payment required</text>

  <!-- Node 4: Payment -->
  <circle cx="1012" cy="195" r="32" fill="#c8c4bf"/>
  <text x="1012" y="203" font-family="'Inter', sans-serif" font-size="22" font-weight="500" fill="#16a34a" text-anchor="middle">$</text>
  <text x="1012" y="248" font-family="'JetBrains Mono', monospace" font-size="11" fill="#16a34a" text-anchor="middle" letter-spacing="0.1em">PAID</text>
  <text x="1012" y="264" font-family="'Inter', sans-serif" font-size="11" fill="#999999" text-anchor="middle">USDC on Base</text>

  <!-- Node 5: Served -->
  <circle cx="1222" cy="195" r="30" fill="#c8c4bf"/>
  <polyline points="1210,195 1218,203 1234,187" fill="none" stroke="#1a1a1a" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
  <text x="1222" y="246" font-family="'JetBrains Mono', monospace" font-size="11" fill="#555555" text-anchor="middle" letter-spacing="0.1em">SERVED</text>
  <text x="1222" y="262" font-family="'Inter', sans-serif" font-size="11" fill="#999999" text-anchor="middle">content delivered</text>

  <!-- Bottom divider -->
  <line x1="72" y1="360" x2="1472" y2="360" stroke="#c8c4bf" stroke-width="1"/>

  <!-- Bottom taglines -->
  <text x="272" y="410" font-family="'JetBrains Mono', monospace" font-size="13" fill="#999999" text-anchor="middle" letter-spacing="0.08em">AI BOTS SCRAPE YOUR CONTENT</text>
  <text x="772" y="410" font-family="'JetBrains Mono', monospace" font-size="13" fill="#555555" text-anchor="middle" letter-spacing="0.08em">XENARCH MAKES THEM PAY</text>
  <text x="1272" y="410" font-family="'JetBrains Mono', monospace" font-size="13" fill="#999999" text-anchor="middle" letter-spacing="0.08em">YOU EARN USDC</text>
</svg>
