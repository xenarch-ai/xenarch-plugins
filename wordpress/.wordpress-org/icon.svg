<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">
  <!-- Xenarch WordPress plugin icon — X constellation -->
  <rect width="512" height="512" rx="64" fill="#0a0a0a"/>
  <!-- Edges -->
  <line x1="128" y1="128" x2="256" y2="256" stroke="#333333" stroke-width="6"/>
  <line x1="384" y1="128" x2="256" y2="256" stroke="#333333" stroke-width="6"/>
  <line x1="128" y1="384" x2="256" y2="256" stroke="#333333" stroke-width="6"/>
  <line x1="384" y1="384" x2="256" y2="256" stroke="#333333" stroke-width="6"/>
  <!-- Corner nodes -->
  <circle cx="128" cy="128" r="24" fill="#f0f0f0"/>
  <circle cx="384" cy="128" r="24" fill="#f0f0f0"/>
  <circle cx="128" cy="384" r="24" fill="#f0f0f0"/>
  <circle cx="384" cy="384" r="24" fill="#f0f0f0"/>
  <!-- Hub node -->
  <circle cx="256" cy="256" r="32" fill="#f0f0f0"/>
</svg>
