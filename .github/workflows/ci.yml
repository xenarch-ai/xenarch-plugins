name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  php-lint:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.2"

      - name: PHP syntax lint
        run: |
          set -e
          find . -type f -name "*.php" -not -path "./vendor/*" -not -path "./node_modules/*" -print0 \
            | xargs -0 -n1 -P4 php -l
